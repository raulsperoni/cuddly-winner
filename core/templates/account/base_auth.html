<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Account{% endblock %} · cuddly-winner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=Lora:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --app-bg: #09090b;
        --app-bg-soft: #111118;
        --surface-1: rgba(24, 24, 27, 0.9);
        --surface-2: rgba(39, 39, 42, 0.45);
        --surface-elevated: rgba(16, 16, 19, 0.95);
        --text-main: #ece9e4;
        --text-strong: #f7f4ef;
        --text-muted: #a1a1aa;
        --text-subtle: #71717a;
        --border-subtle: rgba(82, 82, 91, 0.32);
        --border-strong: rgba(113, 113, 122, 0.45);
        --accent: #d4a652;
        --accent-soft: rgba(212, 166, 82, 0.12);
        --success: #5ea890;
        --success-soft: rgba(94, 168, 144, 0.12);
        --danger: #b65f5f;
        --danger-soft: rgba(182, 95, 95, 0.12);
      }
      html[data-theme="light"] {
        --app-bg: #f6f0e7;
        --app-bg-soft: #fbf7f0;
        --surface-1: rgba(255, 252, 248, 0.92);
        --surface-2: rgba(240, 233, 223, 0.85);
        --surface-elevated: rgba(255, 252, 248, 0.97);
        --text-main: #2f2923;
        --text-strong: #171311;
        --text-muted: #665d56;
        --text-subtle: #8f847a;
        --border-subtle: rgba(118, 103, 90, 0.18);
        --border-strong: rgba(118, 103, 90, 0.32);
        --accent: #9b6c16;
        --accent-soft: rgba(155, 108, 22, 0.1);
        --success: #2f7f64;
        --success-soft: rgba(47, 127, 100, 0.1);
        --danger: #9d4444;
        --danger-soft: rgba(157, 68, 68, 0.1);
      }
      body { font-family: 'IBM Plex Sans', sans-serif; }
      .prose-font { font-family: 'Lora', serif; }
      .mono-font { font-family: 'IBM Plex Mono', monospace; }
    </style>
    <script>
      (() => {
        const stored = window.localStorage.getItem('cw-theme')
        const theme = stored || 'dark'
        document.documentElement.dataset.theme = theme
      })()
      function toggleTheme() {
        const current = document.documentElement.dataset.theme === 'light' ? 'light' : 'dark'
        const next = current === 'dark' ? 'light' : 'dark'
        document.documentElement.dataset.theme = next
        window.localStorage.setItem('cw-theme', next)
      }
    </script>
  </head>
  <body class="min-h-screen [background:var(--app-bg)] [color:var(--text-main)]">
    <header class="mx-auto flex max-w-6xl items-center justify-between px-6 py-5">
      <a href="/" class="mono-font text-[11px] uppercase tracking-[0.25em] [color:var(--text-subtle)] transition hover:[color:var(--text-main)]">
        accountable drafting
      </a>
      <button
        type="button"
        onclick="toggleTheme()"
        class="mono-font rounded-xl border px-3 py-2 text-[11px] uppercase tracking-[0.2em] transition [border-color:var(--border-subtle)] [color:var(--text-muted)] hover:[border-color:var(--border-strong)] hover:[color:var(--text-main)]"
      >
        Toggle theme
      </button>
    </header>

    <main class="mx-auto flex min-h-[calc(100vh-5rem)] max-w-6xl items-center px-6 pb-12">
      <div class="grid w-full gap-12 lg:grid-cols-[1.1fr_0.9fr]">
        <section class="max-w-2xl">
          <div class="mono-font text-[11px] uppercase tracking-[0.25em] [color:var(--text-subtle)]">
            {% block eyebrow %}Accountable drafting{% endblock %}
          </div>
          <h1 class="prose-font mt-4 text-4xl leading-tight [color:var(--text-strong)]">
            {% block heading %}{% endblock %}
          </h1>
          <p class="mt-6 max-w-xl text-base leading-8 [color:var(--text-muted)]">
            {% block intro %}{% endblock %}
          </p>
          {% block side_note %}{% endblock %}
        </section>

        <section class="rounded-[1.75rem] border p-8 shadow-2xl [border-color:var(--border-subtle)] [background:var(--surface-elevated)] [box-shadow:0_20px_60px_rgba(0,0,0,0.16)]">
          {% block panel %}{% endblock %}
        </section>
      </div>
    </main>
  </body>
</html>
