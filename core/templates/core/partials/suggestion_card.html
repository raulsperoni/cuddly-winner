<div id="suggestion-{{ suggestion.pk }}"
     class="bg-gray-800 border border-purple-900 rounded p-4">
  <div class="flex items-center gap-2 mb-2">
    <span class="text-xs px-2 py-0.5 rounded-full bg-purple-900 text-purple-200">
      AI · {{ suggestion.get_suggestion_type_display }}
    </span>
    <span class="text-xs text-gray-600">
      {{ suggestion.created_at|timesince }} ago
    </span>
  </div>
  <div class="prose prose-invert prose-sm max-w-none text-sm mb-3"
       data-markdown="{{ suggestion.text }}"></div>
  <div class="flex items-center gap-2">
    <form
      hx-post="{% url 'suggestion_accept' document.pk block.pk suggestion.pk %}"
      hx-target="#block-{{ block.pk }}"
      hx-swap="outerHTML">
      {% csrf_token %}
      <button type="submit"
              class="text-xs bg-green-700 hover:bg-green-600 text-white
                     px-3 py-1 rounded transition">
        Accept
      </button>
    </form>
    <form
      hx-post="{% url 'suggestion_reject' document.pk block.pk suggestion.pk %}"
      hx-target="#block-{{ block.pk }}"
      hx-swap="outerHTML">
      {% csrf_token %}
      <button type="submit"
              class="text-xs bg-red-900 hover:bg-red-800 text-red-200
                     px-3 py-1 rounded transition">
        Reject
      </button>
    </form>
  </div>
</div>
