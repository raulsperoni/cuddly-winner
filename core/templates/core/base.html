<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Prose{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
  <meta name="csrf-token" content="{{ csrf_token }}">
  <style>
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator { display: inline-flex; }
    .ProseMirror { outline: none; min-height: 5rem; }
    .ProseMirror p.is-editor-empty:first-child::before {
      content: attr(data-placeholder);
      color: #6b7280;
      pointer-events: none;
      float: left;
      height: 0;
    }
  </style>
  <script>
    document.addEventListener('htmx:configRequest', function(evt) {
      evt.detail.headers['X-CSRFToken'] = document.querySelector(
        'meta[name="csrf-token"]'
      ).getAttribute('content');
    });
  </script>
  <script type="importmap">
  {
    "imports": {
      "@tiptap/core": "https://esm.sh/@tiptap/core@3.20.4",
      "@tiptap/starter-kit": "https://esm.sh/@tiptap/starter-kit@3.20.4?deps=@tiptap/core@3.20.4",
      "tiptap-markdown": "https://esm.sh/tiptap-markdown@0.9.0?deps=@tiptap/core@3.20.4",
      "marked": "https://esm.sh/marked@12.0.0"
    }
  }
  </script>
  <script type="module">
    import { Editor } from '@tiptap/core';
    import StarterKit from '@tiptap/starter-kit';
    import { Markdown } from 'tiptap-markdown';
    import { marked } from 'marked';

    window.Prose = {
      Editor,
      StarterKit,
      Markdown,
      markedParse: marked.parse.bind(marked),
    };

    function renderMarkdownElements(root) {
      (root || document).querySelectorAll('[data-markdown]').forEach(function(el) {
        el.innerHTML = window.Prose.markedParse(el.dataset.markdown || '');
      });
    }

    renderMarkdownElements();

    document.addEventListener('htmx:afterSwap', function(evt) {
      renderMarkdownElements(evt.detail.target);
    });
  </script>
</head>
<body class="h-full text-gray-100">

  <nav class="bg-gray-900 border-b border-gray-800 px-4 py-3 flex items-center justify-between">
    <a href="/" class="text-xl font-bold text-indigo-400 tracking-tight">Prose</a>
    <div class="flex items-center gap-4 text-sm">
      {% if user.is_authenticated %}
        <span class="text-gray-400">{{ user.email }}</span>
        <a href="{% url 'account_logout' %}"
           class="text-gray-400 hover:text-white transition">Logout</a>
      {% else %}
        <a href="{% url 'account_login' %}"
           class="text-gray-400 hover:text-white transition">Login</a>
      {% endif %}
    </div>
  </nav>

  {% if messages %}
    <div class="max-w-4xl mx-auto mt-4 px-4 space-y-2">
      {% for message in messages %}
        <div class="px-4 py-2 rounded text-sm
          {% if message.tags == 'error' %}bg-red-800 text-red-100
          {% else %}bg-green-800 text-green-100{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}

  <main class="{% block main_class %}max-w-4xl mx-auto px-4 py-8{% endblock %}">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
